spring.application.name=receitix

# ====================================================================
# Banco de dados - valores vêm do Infisical (path /receitix) via .env
# gerado no stage "Fetch Secrets" do Jenkinsfile. Em dev local, defina
# no seu .env (veja .env.example).
# ====================================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.port=8402

# ====================================================================
# JWT - chave usada para assinar/verificar os tokens de autenticacao
# Vem da variavel de ambiente JWT_SECRET (injetada via Infisical/Jenkins)
# ====================================================================
jwt.secret=${JWT_SECRET}

# ====================================================================
# Recuperação de senha - E-mail (SMTP)
# Os valores vêm de variáveis de ambiente. Se não forem definidos, o
# código aparece apenas no console do servidor (modo desenvolvimento),
# o que já é suficiente para testar o fluxo.
#   1. Ative a verificação em 2 etapas na sua conta Google
#   2. Gere uma "Senha de app" em https://myaccount.google.com/apppasswords
#   3. Use essa senha de app como MAIL_PASSWORD
# ====================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====================================================================
# Recuperação de senha - SMS (Twilio)
# Crie uma conta gratuita em https://www.twilio.com/try-twilio e preencha
# os 3 valores como variáveis de ambiente para habilitar o envio REAL de SMS.
# Se deixar em branco, o código aparece apenas no console do servidor.
# ====================================================================
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
